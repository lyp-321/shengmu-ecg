<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加入 ECG AI Pulse</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --secondary: #a855f7;
            --accent: #f43f5e;
            --success: #10b981;
            --bg-dark: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image:
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .register-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 2.5rem;
            margin-bottom: 8px;
            background: linear-gradient(to right, var(--primary-light), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo p {
            color: var(--text-dim);
            font-size: 1rem;
            font-weight: 300;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .full-width {
            grid-column: span 2;
        }

        label {
            display: block;
            color: var(--text-dim);
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .links {
            text-align: center;
            margin-top: 25px;
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .links a {
            color: var(--primary-light);
            text-decoration: none;
            font-weight: 600;
        }

        .error {
            background: rgba(244, 63, 94, 0.1);
            color: var(--accent);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.85rem;
            border: 1px solid rgba(244, 63, 94, 0.2);
        }

        .success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.85rem;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
    </style>
</head>

<body>
    <div class="register-container">
        <div class="logo">
            <h1>🫀</h1>
            <p>创建您的 ECG AI 账户</p>
        </div>

        <div class="error" id="error"></div>
        <div class="success" id="success"></div>

        <form id="registerForm">
            <div class="form-grid">
                <div class="form-group full-width">
                    <label for="username">用户名 *</label>
                    <input type="text" id="username" required placeholder="选择一个唯一的用户名">
                </div>
                <div class="form-group full-width">
                    <label for="email">电子邮箱 *</label>
                    <input type="email" id="email" required placeholder="your@email.com">
                </div>
                <div class="form-group full-width">
                    <label for="full_name">真实姓名</label>
                    <input type="text" id="full_name" placeholder="您的姓名（可选）">
                </div>
                <div class="form-group">
                    <label for="password">设置密码 *</label>
                    <input type="password" id="password" required minlength="6" placeholder="至少6位">
                </div>
                <div class="form-group">
                    <label for="confirm_password">确认密码 *</label>
                    <input type="password" id="confirm_password" required placeholder="再次输入">
                </div>
            </div>
            <button type="submit" class="btn" id="registerBtn">立即注册</button>
        </form>

        <div class="links">
            已有账号？<a href="/login.html">返回登录</a>
        </div>
    </div>

    <script>
        const registerForm = document.getElementById('registerForm');
        const registerBtn = document.getElementById('registerBtn');
        const errorDiv = document.getElementById('error');
        const successDiv = document.getElementById('success');

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const full_name = document.getElementById('full_name').value;
            const password = document.getElementById('password').value;
            const confirm_password = document.getElementById('confirm_password').value;

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            if (password !== confirm_password) {
                errorDiv.textContent = '两次输入的密码不匹配';
                errorDiv.style.display = 'block';
                return;
            }

            registerBtn.disabled = true;
            registerBtn.textContent = '正在创建账户...';

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password, full_name })
                });

                const data = await response.json();

                if (response.ok) {
                    successDiv.textContent = '账户创建成功！正在跳转登录...';
                    successDiv.style.display = 'block';
                    setTimeout(() => window.location.href = '/login.html', 1500);
                } else {
                    errorDiv.textContent = data.detail || '注册失败，请检查输入';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = '无法连接到服务器，请稍后重试';
                errorDiv.style.display = 'block';
            } finally {
                registerBtn.disabled = false;
                registerBtn.textContent = '立即注册';
            }
        });
    </script>
</body>

</html>
