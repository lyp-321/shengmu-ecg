<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECG 智能健康仪表盘</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --secondary: #a855f7;
            --accent: #f43f5e;
            --success: #10b981;
            --warning: #f59e0b;
            --bg-dark: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --sidebar-width: 260px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image:
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(168, 85, 247, 0.15) 0px, transparent 50%),
                radial-gradient(at 50% 100%, rgba(244, 63, 94, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* 侧边栏 */
        .sidebar {
            width: var(--sidebar-width);
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(to right, var(--primary-light), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-menu {
            list-style: none;
            flex-grow: 1;
        }

        .nav-item {
            margin-bottom: 8px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: var(--text-dim);
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s;
            font-weight: 500;
        }

        .nav-link:hover,
        .nav-link.active {
            background: var(--glass-bg);
            color: var(--text-main);
            transform: translateX(5px);
        }

        .nav-link.active {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(168, 85, 247, 0.2));
            border: 1px solid var(--glass-border);
        }

        /* 主内容区 */
        .main-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px;
            position: relative;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
            background: var(--glass-bg);
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
        }

        .avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
        }

        .logout-btn {
            background: transparent;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            margin-left: 10px;
        }

        /* 仪表盘网格 */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-bottom: 30px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .card-title {
            color: var(--text-dim);
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }

        .card-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .card-unit {
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        /* 上传卡片 */
        .upload-card {
            grid-column: span 3;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 30px 40px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(168, 85, 247, 0.1));
        }

        .upload-info h2 {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .upload-info p {
            color: var(--text-dim);
        }

        .upload-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 12px 30px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.5);
        }

        /* 图表卡片 */
        .chart-card {
            grid-column: span 2;
            height: 350px;
        }

        .diagnosis-card {
            grid-column: span 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-completed {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .status-pending {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
            animation: pulse 2s infinite;
        }

        .status-failed {
            background: rgba(244, 63, 94, 0.2);
            color: var(--accent);
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }

            100% {
                opacity: 1;
            }
        }

        /* 历史记录表格 */
        .history-section {
            margin-top: 40px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
        }

        .history-table th {
            text-align: left;
            padding: 15px;
            color: var(--text-dim);
            font-size: 0.85rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .history-table td {
            padding: 15px;
            border-bottom: 1px solid var(--glass-border);
            font-size: 0.95rem;
        }

        .history-table tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-dim);
        }

        #loadingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid var(--glass-bg);
            border-bottom-color: var(--primary);
            border-radius: 50%;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div id="loadingOverlay">
        <div class="loader"></div>
    </div>

    <!-- 侧边栏 -->
    <aside class="sidebar">
        <div class="logo">
            <span>🫀</span> ECG AI Pulse
        </div>
        <nav class="nav-menu">
            <div class="nav-item">
                <a href="#" class="nav-link active">
                    <span>📊</span> 仪表盘
                </a>
            </div>
            <div class="nav-item">
                <a href="#" class="nav-link">
                    <span>📂</span> 历史记录
                </a>
            </div>
            <div class="nav-item">
                <a href="#" class="nav-link">
                    <span>⚙️</span> 系统设置
                </a>
            </div>
        </nav>
        <div style="padding-top: 20px; border-top: 1px solid var(--glass-border);">
            <p style="font-size: 0.75rem; color: var(--text-dim); text-align: center;">v1.2.0 Pro Edition</p>
        </div>
    </aside>

    <!-- 主内容 -->
    <main class="main-content">
        <header class="top-bar">
            <h1 style="font-size: 1.8rem; font-weight: 700;">健康概览</h1>
            <div class="user-profile">
                <div class="avatar" id="userAvatar">A</div>
                <span id="userName" style="font-weight: 600; font-size: 0.95rem;">加载中...</span>
                <button onclick="logout()" class="logout-btn">登出</button>
            </div>
        </header>

        <div class="dashboard-grid">
            <!-- 上传卡片 -->
            <div class="glass-card upload-card">
                <div class="upload-info">
                    <h2>开始新的分析</h2>
                    <p>上传您的 ECG 数据文件 (CSV/DAT)，AI 将为您实时诊断</p>
                </div>
                <div class="upload-actions">
                    <input type="file" id="fileInput" accept=".csv,.dat" style="display: none;">
                    <span id="selectedFileName"
                        style="color: var(--primary-light); font-weight: 500; font-size: 0.9rem;"></span>
                    <button class="btn-primary" onclick="document.getElementById('fileInput').click()">
                        选择并上传
                    </button>
                </div>
            </div>

            <!-- 指标卡片 -->
            <div class="glass-card">
                <div class="card-title">平均心率 <span>❤️</span></div>
                <div class="card-value" id="valHeartRate">--</div>
                <div class="card-unit">BPM (每分钟心跳)</div>
            </div>
            <div class="glass-card">
                <div class="card-title">HRV SDNN <span>📈</span></div>
                <div class="card-value" id="valSDNN">--</div>
                <div class="card-unit">ms (心率变异性)</div>
            </div>
            <div class="glass-card">
                <div class="card-title">风险等级 <span>🛡️</span></div>
                <div class="card-value" id="valRisk" style="font-size: 1.8rem; padding-top: 10px;">--</div>
                <div class="card-unit" id="valDiagnosis">等待分析数据...</div>
            </div>

            <!-- 图表卡片 -->
            <div class="glass-card chart-card">
                <div class="card-title">心率趋势分析</div>
                <canvas id="heartRateChart"></canvas>
            </div>

            <!-- 诊断详情 -->
            <div class="glass-card diagnosis-card">
                <div id="statusBadgeContainer"></div>
                <div id="diagnosisDetail" style="margin-top: 20px; font-size: 1.1rem; line-height: 1.6;">
                    请上传心电图文件以开始智能诊断流程。
                </div>
            </div>
        </div>

        <!-- 历史记录 -->
        <section class="history-section">
            <div class="section-header">
                <h2 style="font-size: 1.4rem;">最近分析记录</h2>
                <button onclick="loadHistory()"
                    style="background: transparent; border: none; color: var(--primary-light); cursor: pointer; font-weight: 600;">刷新列表</button>
            </div>
            <div class="glass-card" style="padding: 0; overflow: hidden;">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>文件名</th>
                            <th>状态</th>
                            <th>心率</th>
                            <th>诊断结果</th>
                            <th>分析时间</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                        <!-- 动态加载 -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        let hrChart = null;

        // 初始化图表
        function initChart() {
            const ctx = document.getElementById('heartRateChart').getContext('2d');
            hrChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: '心率 (BPM)',
                        data: [],
                        borderColor: '#6366f1',
                        backgroundColor: 'rgba(99, 102, 241, 0.1)',
                        borderWidth: 3,
                        tension: 0.4,
                        fill: true,
                        pointBackgroundColor: '#fff',
                        pointBorderColor: '#6366f1',
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            grid: { color: 'rgba(255, 255, 255, 0.05)' },
                            ticks: { color: '#94a3b8' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#94a3b8' }
                        }
                    }
                }
            });
        }

        // 登录检查
        async function checkLogin() {
            const token = localStorage.getItem('access_token');
            if (!token) {
                window.location.href = '/login.html';
                return;
            }

            try {
                const response = await fetch('/api/auth/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!response.ok) throw new Error();
                const user = await response.json();
                document.getElementById('userName').textContent = user.full_name || user.username;
                document.getElementById('userAvatar').textContent = (user.full_name || user.username)[0].toUpperCase();

                // 隐藏加载遮罩
                setTimeout(() => {
                    document.getElementById('loadingOverlay').style.opacity = '0';
                    setTimeout(() => document.getElementById('loadingOverlay').style.display = 'none', 500);
                }, 800);

                loadHistory();
            } catch (e) {
                localStorage.removeItem('access_token');
                window.location.href = '/login.html';
            }
        }

        function logout() {
            localStorage.removeItem('access_token');
            window.location.href = '/login.html';
        }

        // 加载历史记录
        async function loadHistory() {
            const token = localStorage.getItem('access_token');
            try {
                const response = await fetch('/api/ecg/tasks', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const tasks = await response.json();
                const tbody = document.getElementById('historyBody');
                tbody.innerHTML = '';

                tasks.slice(0, 10).forEach(task => {
                    const row = document.createElement('tr');
                    const statusClass = `status-${task.status}`;
                    const statusText = task.status === 'completed' ? '已完成' : (task.status === 'failed' ? '失败' : '分析中');
                    const hr = task.result ? task.result.heart_rate.toFixed(1) : '--';
                    const diagnosis = task.result ? task.result.diagnosis : '--';
                    const date = new Date(task.created_at).toLocaleString();

                    row.innerHTML = `
                        <td>${task.filename}</td>
                        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                        <td>${hr}</td>
                        <td>${diagnosis}</td>
                        <td>${date}</td>
                    `;
                    tbody.appendChild(row);
                });

                // 如果有已完成的任务，更新图表
                const completedTasks = tasks.filter(t => t.status === 'completed').reverse();
                if (completedTasks.length > 0) {
                    updateChart(completedTasks);
                    // 显示最近的一个结果
                    updateDashboard(completedTasks[completedTasks.length - 1]);
                }
            } catch (e) {
                console.error('加载历史失败', e);
            }
        }

        function updateChart(tasks) {
            hrChart.data.labels = tasks.map(t => new Date(t.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
            hrChart.data.datasets[0].data = tasks.map(t => t.result.heart_rate);
            hrChart.update();
        }

        function updateDashboard(task) {
            if (!task.result) return;

            document.getElementById('valHeartRate').textContent = task.result.heart_rate.toFixed(1);
            document.getElementById('valSDNN').textContent = task.result.hrv_sdnn.toFixed(1);
            document.getElementById('valRisk').textContent = task.result.risk_level;
            document.getElementById('valDiagnosis').textContent = task.result.diagnosis;

            const riskColors = { '低风险': 'var(--success)', '中风险': 'var(--warning)', '高风险': 'var(--accent)' };
            document.getElementById('valRisk').style.color = riskColors[task.result.risk_level] || 'var(--text-main)';

            const statusClass = `status-${task.status}`;
            const statusText = task.status === 'completed' ? '已完成' : (task.status === 'failed' ? '失败' : '分析中');
            document.getElementById('statusBadgeContainer').innerHTML = `<span class="status-badge ${statusClass}">${statusText}</span>`;
            document.getElementById('diagnosisDetail').textContent = `针对文件 ${task.filename} 的分析已完成。检测到${task.result.diagnosis}，建议保持关注。`;
        }

        // 上传逻辑
        const fileInput = document.getElementById('fileInput');
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('selectedFileName').textContent = file.name;
            const token = localStorage.getItem('access_token');
            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/api/ecg/upload', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });
                const task = await response.json();
                pollResult(task.id);
            } catch (error) {
                alert('上传失败: ' + error.message);
            }
        });

        async function pollResult(taskId) {
            const token = localStorage.getItem('access_token');
            const interval = setInterval(async () => {
                const response = await fetch(`/api/ecg/tasks/${taskId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const task = await response.json();

                // 更新仪表盘状态
                const statusClass = `status-${task.status}`;
                const statusText = task.status === 'completed' ? '已完成' : (task.status === 'failed' ? '失败' : '分析中');
                document.getElementById('statusBadgeContainer').innerHTML = `<span class="status-badge ${statusClass}">${statusText}</span>`;

                if (task.status === 'completed') {
                    clearInterval(interval);
                    updateDashboard(task);
                    loadHistory();
                } else if (task.status === 'failed') {
                    clearInterval(interval);
                    document.getElementById('diagnosisDetail').textContent = '分析失败: ' + task.error_message;
                }
            }, 2000);
        }

        window.onload = () => {
            initChart();
            checkLogin();
        };
    </script>
</body>

</html>
